appId: com.orchestrator.app
productName: Orchestrator
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - "!out/renderer/**/*"
extraResources:
  - from: out/renderer
    to: renderer
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
npmRebuild: true
